# Release config consumed by `byt release` (ADR-0021).
# Go app: byt cross-compiles with the Go toolchain in the container for linux
# and natively on the macOS runner, then combines + publishes.
#
# NOTE: the legacy AUR `scrpr` package was source-built; this converts it to a
# prebuilt-binary package under the same name.
[release]
name = "scrpr"
lang = "go"
bins = ["scrpr"]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

[release.homebrew]
formula = "scrpr"

[release.aur]
pkgname = "scrpr"
pkgdesc = "A fast CLI for extracting main content from websites"
license = "MIT"
url = "https://github.com/byteowlz/scrpr"
conflicts = ["scrpr-bin"]
